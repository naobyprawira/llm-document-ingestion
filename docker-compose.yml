version: '3.8'

services:
  # Local Qdrant server for development and testing. In production
  # you might use Qdrant Cloud and can omit this service.
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO

  # Example application container. This is provided as a reference
  # and is not strictly required for ingestion. You can run the
  # ingestion CLI from the host or another container.
  app:
    build: .
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - QDRANT_COLLECTION=prb-documents-gemini
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEFAULT_LANGUAGE=id
    # By default show help for the CLI. Override the command to run
    # ingestion or deletion tasks, for example:
    # command: ["python", "cli/ingest_pdf.py", "--file", "/data/doc.pdf", "--doc-id", "DOC001", "--scope", "Internal", "--company", "PRB", "--country", "ID"]

volumes:
  qdrant_storage:
    driver: local